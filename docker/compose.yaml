name: rag

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: rag-postgres-zhparser:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: rag-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      QDRANT_URL: http://qdrant:6333
      MODEL_CACHE_DIR: /app/models
      HTTP_PORT: 3000
    volumes:
      - rag-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: rag-frontend:latest
    restart: unless-stopped
    ports:
      # 显式绑到 0.0.0.0，便于局域网访问。改成 127.0.0.1:${HTTP_PORT}:80 可锁回本机。
      - "0.0.0.0:${HTTP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  qdrant-storage:
  rag-models:
